services:
  database:
    image: mongo:6.0
    container_name: mern_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: mern_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - PORT=8000
      - DB_URL=mongodb://database:27017/lms
    depends_on:
      database:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: mern_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo_data:
